name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite

      - name: Check imports
        run: |
          python -c "
          import os
          print('DATABASE_URL:', os.environ.get('DATABASE_URL', 'NOT SET'))
          from app.config import settings
          print('settings.DATABASE_URL:', settings.DATABASE_URL)
          from app.database import engine
          print('Engine dialect:', engine.dialect.name)
          print('All imports OK')
          "
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-at-least-32-chars-long

      - name: Run tests
        timeout-minutes: 3
        run: pytest tests/ -v --tb=long -p no:timeout
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-at-least-32-chars-long

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ scripts/ tests/
